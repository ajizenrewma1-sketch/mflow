<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Helper System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1545143877-4e758e65b45a?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e2e8f0;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
            font-size: 2.5rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.6);
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .m-flow-glow {
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.8), 0 0 20px rgba(96, 165, 250, 0.5);
            animation: sparkle 1.5s linear infinite alternate;
        }

        @keyframes sparkle {
            from { opacity: 0.8; filter: brightness(1); }
            to { opacity: 1; filter: brightness(1.5) drop-shadow(0 0 8px #60a5fa); }
        }

        .sidebar {
            width: 60px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(96, 165, 250, 0.2);
        }

        .sidebar:hover {
            width: 280px;
        }

        .sidebar-text {
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        .sidebar:hover .sidebar-text {
            opacity: 1;
        }

        /* ซ่อนแถบเลื่อนในเมนู Sidebar */
        #sidebar-nav {
            scrollbar-width: none; /* สำหรับ Firefox */
            -ms-overflow-style: none;  /* สำหรับ Internet Explorer และ Edge */
        }
        
        #sidebar-nav::-webkit-scrollbar {
            display: none; /* สำหรับ Chrome, Safari และ Opera */
        }

        #app-header {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(96, 165, 250, 0.15);
        }

        .content-area {
            flex: 1;
            height: 100vh;
            position: relative;
            will-change: transform;
        }

        .app-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: white; 
            border-radius: 1.5rem 0 0 0;
            display: none; 
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .app-iframe.active {
            display: block; 
        }

        .hidden { display: none; }

        .nav-item {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            margin: 4px 0;
            cursor: pointer;
        }
        .nav-item:hover {
            background: rgba(96, 165, 250, 0.15);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.1);
        }
        
        .nav-item.active-menu {
            background: rgba(96, 165, 250, 0.25);
            border-left: 4px solid #60a5fa;
        }
    </style>
</head>
<body class="flex">

    <!-- Section 1: Welcome Screen -->
    <div id="welcome-screen" class="fixed inset-0 flex flex-col items-center justify-center z-[100] transition-opacity duration-700">
        <div class="marquee-container mb-12">
            <div class="marquee-text">
                ยินดีต้อนรับเข้าสู่ระบบตัวช่วยการทำงาน <span class="m-flow-glow">M-Flow</span>
            </div>
        </div>
        
        <div class="relative group">
            <div class="absolute -inset-1 bg-blue-500 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
            <button onclick="enterSystem()" class="relative bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-full text-xl font-semibold shadow-2xl transform transition hover:scale-105 active:scale-95 border border-blue-400/30">
                เข้าสู่ระบบ
            </button>
        </div>
    </div>

    <!-- Section 2: Main Application Interface -->
    <div id="main-app" class="flex w-full h-screen hidden opacity-0 transition-opacity duration-700">
        
        <!-- Sidebar Menu -->
        <aside class="sidebar text-white flex flex-col h-full shadow-2xl overflow-hidden">
            <div onclick="goBackHome()" title="กลับหน้าแรกและล้างข้อมูลทั้งหมด" class="p-4 flex items-center mb-6 border-b border-white/5 cursor-pointer hover:bg-white/5 transition-colors group">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex-shrink-0 flex items-center justify-center font-bold shadow-[0_0_15px_rgba(59,130,246,0.6)] group-hover:scale-110 transition-transform">M</div>
                <span class="sidebar-text ml-4 font-bold text-lg tracking-wider text-blue-400 group-hover:text-blue-300">M-FLOW HUB</span>
            </div>

            <nav id="sidebar-nav" class="flex-1 space-y-1 overflow-y-auto px-2">
                <!-- Navigation Buttons -->
                <button onclick="switchApp('sla', 'https://sla-temp.vercel.app/')" data-id="sla" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">⏱️</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">SLA 3 ชั่วโมง</span>
                </button>
                <button onclick="switchApp('r05', 'https://r05-vs-tcvs.vercel.app/')" data-id="r05" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">📊</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">ชนข้อมูลต่างๆ</span>
                </button>
                <button onclick="switchApp('dispute-find', 'https://dispult.vercel.app/')" data-id="dispute-find" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">🔍</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">หาเหตุผลที่ไม่เจอ TCVS</span>
                </button>
                <button onclick="switchApp('pinai', 'https://pinai.vercel.app/')" data-id="pinai" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">📜</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">ทำพินัย</span>
                </button>
                <button onclick="switchApp('multi-dis', 'https://multi-dispul.vercel.app/')" data-id="multi-dis" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">🚗</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">การทำโต้แย้งหลายทะเบียน</span>
                </button>
                <button onclick="switchApp('single-dis', 'https://dupit.netlify.app/')" data-id="single-dis" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">📍</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">การทำโต้แย้งทีละ 1 ทะเบียน</span>
                </button>
                <button onclick="switchApp('log-l', 'https://log-l.vercel.app/')" data-id="log-l" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">📝</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">แยก Log L</span>
                </button>
                <button onclick="switchApp('tg-ยอด', 'https://tg-five-xi.vercel.app/')" data-id="tg-ยอด" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">📈</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">ทำยอด TG</span>
                </button>
                <button onclick="switchApp('temp-press', 'https://temp3hours.vercel.app/')" data-id="temp-press" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">💡</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">ทำยอดกดน้อง Temp</span>
                </button>
                <button onclick="switchApp('temp-wrong', 'https://temp-wong.vercel.app/')" data-id="temp-wrong" class="nav-item w-full flex items-center p-3 rounded-xl hover:text-blue-300 transition-all duration-300 text-left">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-500/10 rounded-lg">⚠️</span>
                    <span class="sidebar-text ml-4 text-sm font-medium">ลงยอดผิด Temp</span>
                </button>
            </nav>

            <div class="p-4 border-t border-white/5 opacity-40 text-[10px] text-center uppercase tracking-widest">
                M-Flow System v3.1 (Optimized)
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area flex flex-col">
            <div id="app-header" class="hidden p-3 flex justify-between items-center">
                <button onclick="closeCurrentApp()" class="flex items-center text-blue-300 hover:text-blue-100 font-medium transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"></path></svg>
                    กลับสู่หน้าเมนูหลัก (ไม่ล้างข้อมูล)
                </button>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <div class="h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></div>
                        <span id="active-app-name" class="text-[10px] text-blue-300/60 uppercase tracking-[0.2em] font-bold">Terminal Active</span>
                    </div>
                </div>
            </div>

            <div id="no-app-selected" class="flex-1 flex flex-col items-center justify-center">
                <div class="text-center relative">
                    <div class="absolute -inset-20 bg-blue-500/5 blur-[100px] rounded-full"></div>
                    <svg class="w-24 h-24 mb-6 opacity-20 mx-auto text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 20l-5.447-2.724A2 2 0 013 15.482V5.518a2 2 0 011.553-1.943L9 2l5.447 2.724A2 2 0 0116 6.669V15l-6 5V20z"></path>
                    </svg>
                    <p class="text-xl font-light tracking-[0.3em] text-blue-400/40 uppercase">เลือกเครื่องมือเพื่อเริ่มต้น</p>
                    <p class="text-[10px] mt-2 text-blue-300/20 italic">ระบบรันแยก Iframe เพื่อป้องกันข้อมูลหายและเพิ่มความเสถียร</p>
                </div>
            </div>

            <div id="iframe-stack" class="flex-1 relative hidden overflow-hidden">
                <!-- Iframes will be generated here dynamically -->
            </div>
        </main>
    </div>

    <script>
        const welcomeScreen = document.getElementById('welcome-screen');
        const mainApp = document.getElementById('main-app');
        const iframeStack = document.getElementById('iframe-stack');
        const noAppSelected = document.getElementById('no-app-selected');
        const appHeader = document.getElementById('app-header');
        const activeAppName = document.getElementById('active-app-name');
        
        let loadedApps = {};

        function enterSystem() {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                setTimeout(() => {
                    mainApp.style.opacity = '1';
                }, 50);
            }, 700);
        }

        function switchApp(id, url) {
            requestAnimationFrame(() => {
                noAppSelected.classList.add('hidden');
                iframeStack.classList.remove('hidden');
                appHeader.classList.remove('hidden');

                const allIframes = document.querySelectorAll('.app-iframe');
                allIframes.forEach(iframe => {
                    iframe.classList.remove('active');
                });

                const navItems = document.querySelectorAll('.nav-item');
                navItems.forEach(item => {
                    if(item.getAttribute('data-id') === id) {
                        item.classList.add('active-menu');
                    } else {
                        item.classList.remove('active-menu');
                    }
                });

                if (!loadedApps[id]) {
                    const newIframe = document.createElement('iframe');
                    newIframe.setAttribute('loading', 'lazy');
                    newIframe.setAttribute('allow', 'clipboard-write');
                    newIframe.className = 'app-iframe active shadow-[0_-20px_50px_rgba(0,0,0,0.5)]';
                    newIframe.id = `iframe-${id}`;
                    
                    iframeStack.appendChild(newIframe);
                    setTimeout(() => {
                        newIframe.src = url;
                    }, 10);
                    
                    loadedApps[id] = newIframe;
                } else {
                    loadedApps[id].classList.add('active');
                }

                activeAppName.innerText = id.toUpperCase() + " RUNNING";
            });
        }

        function closeCurrentApp() {
            iframeStack.classList.add('hidden');
            appHeader.classList.add('hidden');
            noAppSelected.classList.remove('hidden');
            
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active-menu'));

            const allIframes = document.querySelectorAll('.app-iframe');
            allIframes.forEach(iframe => iframe.classList.remove('active'));
        }

        function goBackHome() {
            mainApp.style.opacity = '0';
            setTimeout(() => {
                iframeStack.innerHTML = '';
                loadedApps = {};
                
                iframeStack.classList.add('hidden');
                appHeader.classList.add('hidden');
                noAppSelected.classList.remove('hidden');
                
                welcomeScreen.classList.remove('hidden');
                setTimeout(() => {
                    welcomeScreen.style.opacity = '1';
                    mainApp.classList.add('hidden');
                }, 50);
            }, 700);
        }

        window.addEventListener('beforeunload', () => {
            iframeStack.innerHTML = '';
        });
    </script>
</body>
</html>
