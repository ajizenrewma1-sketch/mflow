<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Future Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0062ff;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --neon-yellow: #fde047;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        .bg-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute;
            inset: 0;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 75px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
            position: relative;
            z-index: 50;
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .sidebar::-webkit-scrollbar { display: none; }

        .sidebar.expanded {
            width: 320px;
            border-right: 1px solid rgba(0, 242, 255, 0.5);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .sidebar.expanded .sidebar-text { opacity: 1 !important; }

        .menu-group {
            margin: 4px 8px;
            border-radius: 12px;
            transition: all 0.3s;
            overflow: hidden;
        }

        .menu-group-title {
            padding: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .sub-menu-container {
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            margin-left: 20px;
            border-left: 1px solid rgba(0, 242, 255, 0.2);
        }

        .menu-group-title:hover {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .menu-group.open .menu-group-title {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .menu-group.open .sub-menu-container {
            max-height: 500px;
            opacity: 1;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .chevron { transition: transform 0.3s ease; }
        .menu-group.open .chevron { transform: rotate(180deg); }

        .nav-item {
            position: relative;
            margin: 4px 12px 4px 0;
            padding: 10px;
            border-radius: 0 12px 12px 0;
            transition: all 0.3s;
            border: 1px solid transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            width: calc(100% - 12px);
        }

        .nav-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            transform: translateX(5px);
        }

        .nav-item.active-menu {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.2) 0%, transparent 100%);
            border-left: 3px solid var(--neon-cyan);
            box-shadow: -10px 0 20px rgba(0, 242, 255, 0.1);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .app-container {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            transform: translateY(10px);
            will-change: transform, opacity;
        }

        .app-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: #fff;
        }

        /* Quick Note Sidebar */
        #quick-note-panel {
            position: fixed;
            right: -320px;
            top: 80px;
            bottom: 80px;
            width: 360px;
            z-index: 60;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
        }

        #quick-note-panel.open { right: 0; }

        .note-toggle {
            width: 40px;
            height: 120px;
            background: var(--neon-cyan);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px 0 0 15px;
            cursor: pointer;
            writing-mode: vertical-rl;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: -5px 0 20px rgba(0, 242, 255, 0.3);
            text-orientation: mixed;
            transform: scaleY(-1);
            align-self: flex-start;
            margin-top: 20px;
        }

        .note-content {
            flex: 1;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 242, 255, 0.3);
            border-top: 1px solid rgba(0, 242, 255, 0.1);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            padding: 20px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        #quick-note-area {
            flex: 1;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
            scrollbar-width: none;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.3);
            position: absolute;
            animation: scanline 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        .text-reveal {
            background: linear-gradient(to right, #fff 20%, #00f2ff 50%, #fff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        /* Logout Screen Styles */
        #logout-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.95), #020617);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .logout-box {
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 3rem;
            border-radius: 30px;
            background: rgba(2, 6, 23, 0.6);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }
        
        .center-absolute {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body class="flex flex-row">
    <div class="bg-grid"></div>

    <!-- Section: Welcome Screen -->
    <div id="welcome-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950 transition-all duration-700">
        <div class="scanline"></div>
        <div class="mb-8 text-center">
            <h1 class="font-future text-6xl font-bold tracking-tighter text-reveal mb-2 uppercase">M-FLOW SYSTEM</h1>
            <p class="text-cyan-500/80 tracking-[0.3em] text-lg font-medium">ศูนย์รวมระบบช่วยเหลือการทำงาน</p>
        </div>
        
        <div class="flex flex-col items-center gap-4">
            <div class="relative group cursor-pointer" onclick="enterSystem()">
                <div class="absolute -inset-4 bg-cyan-500 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition duration-500"></div>
                <button id="login-btn" class="relative px-10 py-4 bg-transparent border border-cyan-500/50 text-cyan-400 rounded-full hover:bg-cyan-500 hover:text-white transition-all duration-300 tracking-widest overflow-hidden">
                    <span class="relative z-10 font-medium text-lg text-white">คลิกเพื่อเข้าใช้งานระบบ</span>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Quick Note Sidebar -->
    <div id="quick-note-panel">
        <div class="note-toggle" onclick="toggleQuickNote()">QUICK NOTE</div>
        <div class="note-content">
            <div class="flex justify-between items-center mb-4">
                <span class="font-future text-cyan-400 text-[10px] tracking-widest">SCRATCHPAD</span>
                <button onclick="clearNote()" class="text-[8px] text-slate-500 hover:text-red-400 transition-colors uppercase">Clear All</button>
            </div>
            <textarea id="quick-note-area" placeholder="พิมพ์เลขทะเบียน, เลขเคส หรือหมายเหตุที่นี่..."></textarea>
        </div>
    </div>

    <!-- Section: Logout Overlay -->
    <div id="logout-overlay">
        <div class="logout-box">
            <div class="mb-6">
                <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <h2 class="font-future text-2xl text-cyan-400 mb-2 uppercase tracking-widest">LOGGING OUT</h2>
                <p class="text-slate-400 text-sm">กำลังลงชื่อออกกรุณารอสักครู่...</p>
            </div>
            <div class="w-64 bg-slate-800 h-1.5 rounded-full overflow-hidden mx-auto border border-white/5">
                <div id="logout-progress" class="bg-cyan-500 h-full w-0 transition-all duration-[2000ms] ease-linear"></div>
            </div>
        </div>
    </div>

    <!-- Preload Status Overlay -->
    <div id="preload-overlay" class="fixed bottom-4 right-4 z-[110] hidden">
        <div class="glass-panel px-4 py-2 flex items-center gap-3 border-cyan-500/30">
            <div class="animate-spin h-3 w-3 border-2 border-cyan-500 border-t-transparent rounded-full"></div>
            <span class="text-[10px] text-cyan-400 font-future uppercase tracking-widest">SYNCING MODULES: <span id="preload-count">0</span>%</span>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="main-sidebar" class="sidebar flex flex-col hidden">
        <div id="sidebar-toggle" class="h-16 flex items-center px-4 mt-2 cursor-pointer hover:bg-cyan-500/10 transition-all group border-b border-cyan-500/10">
            <div class="min-w-[40px] h-10 flex items-center justify-center bg-slate-800/80 rounded-lg border border-cyan-500/30 text-cyan-400 group-hover:bg-cyan-500 group-hover:text-white transition-all shadow-[0_0_10px_rgba(0,242,255,0.2)]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </div>
            <div class="sidebar-text ml-4 opacity-0 transition-opacity duration-300">
                <p class="font-future font-bold text-cyan-400 leading-none uppercase tracking-widest text-lg text-nowrap">MENU HUB</p>
            </div>
        </div>

        <div id="logout-trigger" class="h-16 flex items-center px-4 border-b border-cyan-500/10 cursor-pointer hover:bg-red-500/10 transition-all group" onclick="handleLogoutClick()">
            <div id="logout-icon-box" class="min-w-[40px] h-10 flex items-center justify-center bg-slate-800/80 rounded-lg border border-red-500/30 text-red-500 group-hover:bg-red-500 group-hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </div>
            <div class="sidebar-text ml-4 opacity-0 transition-opacity duration-300">
                <p class="text-xs font-bold text-red-400 uppercase tracking-tighter">ลงชื่อออก</p>
                <p class="text-[8px] text-red-500/60 uppercase">Terminate Session</p>
            </div>
        </div>

        <nav id="sidebar-nav" class="flex-1 space-y-1 pb-4 pt-4">
            <div id="nav-container"></div>
        </nav>

        <div class="p-4 border-t border-cyan-500/10 text-center">
            <div class="sidebar-text opacity-0 text-[7px] text-cyan-500/60 mt-2 font-future transition-opacity duration-300 uppercase tracking-widest">SYSTEM STABLE</div>
        </div>
    </aside>

    <!-- Main UI -->
    <main id="main-content" class="flex-1 flex flex-col relative hidden p-4">
        <header id="top-bar" class="flex justify-between items-center mb-4 px-2 relative h-12">
            <div class="flex items-center gap-4 z-10">
                <button onclick="gotoHome()" class="p-2 glass-panel hover:bg-cyan-500/10 text-slate-400 hover:text-cyan-400 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                </button>
                <div>
                    <h2 id="display-title" class="font-future text-cyan-400 text-sm uppercase tracking-wider leading-none mt-1">หน้าหลัก</h2>
                    <span class="text-[9px] text-slate-500 font-future uppercase">M-FLOW <span class="text-cyan-500">WORKSPACE</span></span>
                </div>
            </div>

            <div class="center-absolute z-0 flex justify-center">
                <div class="glass-panel px-6 py-2 flex items-center gap-4 border-cyan-500/20 shadow-[0_0_15px_rgba(0,242,255,0.05)]">
                    <div id="digital-clock" class="font-future text-xl font-bold text-cyan-400 tracking-widest min-w-[110px] text-center">00:00:00</div>
                    <div class="w-[1px] h-5 bg-slate-600"></div>
                    <div id="current-date" class="text-xs font-future text-slate-300 tracking-wider uppercase">-- / -- / ----</div>
                </div>
            </div>

            <div class="flex items-center gap-4 glass-panel px-4 py-1.5 z-10">
                <div class="flex flex-col items-end">
                    <span class="text-[8px] text-slate-500 uppercase tracking-tighter leading-none">เซิร์ฟเวอร์</span>
                    <span class="text-[10px] font-future text-cyan-300">ออนไลน์</span>
                </div>
                <div class="led text-green-500 bg-current"></div>
            </div>
        </header>

        <div id="stack-container" class="flex-1 relative rounded-3xl overflow-hidden border border-white/5 shadow-2xl"></div>
    </main>

    <script>
        const HOME_APP_ID = 'monitor-intelligence';
        const HOME_APP_URL = 'https://m-flow-intelligence.vercel.app/';
        const HOME_APP_NAME = 'Intelligence Monitoring';

        const MENU_GROUPS = [
            {
                id: 'grp-monitor',
                name: 'ระบบตรวจสอบ',
                icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>',
                items: [
                    { id: HOME_APP_ID, name: HOME_APP_NAME, url: HOME_APP_URL, icon: '📊' }
                ]
            },
            {
                id: 'grp-data',
                name: 'กลุ่มชนข้อมูล',
                icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>',
                items: [
                    { id: 'r05', name: 'ชนข้อมูลต่างๆ', url: 'https://r05-vs-tcvs.vercel.app/', icon: '📊' },
                    { id: 'r05-8gb', name: 'ชนข้อมูลสำหรับแรม 8 GB', url: 'https://r05-tcvs-v2.vercel.app/', icon: '⚡' },
                    { id: 'dispute-find', name: 'หาสาเหตุไม่เจอ TCVS', url: 'https://dispult.vercel.app/', icon: '🔍' },
                    { id: 'excel-include', name: 'รวมช่อง Excel', url: 'https://include-sentences.vercel.app/', icon: '📂' }
                ]
            },
            {
                id: 'grp-dispute',
                name: 'กลุ่มการทำโต้แย้ง',
                icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>',
                items: [
                    { id: 'pinai', name: 'ทำพินัย', url: 'https://pinai.vercel.app/', icon: '📜' },
                    { id: 'multi-dis', name: 'โต้แย้งหลายทะเบียน', url: 'https://multi-dispul.vercel.app/', icon: '🚗' },
                    { id: 'single-dis', name: 'โต้แย้ง 1 ทะเบียน', url: 'https://dupit.netlify.app/', icon: '📍' },
                    { id: 'log-l', name: 'แยก Log L', url: 'https://log-l.vercel.app/', icon: '📝' }
                ]
            },
            {
                id: 'grp-daily',
                name: 'การทำงานทั่วไปประจำวัน',
                icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>',
                items: [
                    { id: 'sla', name: 'SLA 3 ชั่วโมง', url: 'https://sla-temp.vercel.app/', icon: '⏱️' },
                    { id: 'tg-ยอด', name: 'ทำยอด TG', url: 'https://tg-five-xi.vercel.app/', icon: '📈' },
                    { id: 'temp-press', name: 'ทำยอดกดน้อง Temp', url: 'https://temp3hours.vercel.app/', icon: '💡' },
                    { id: 'temp-wrong', name: 'ลงยอดผิด Temp', url: 'https://temp-wong.vercel.app/', icon: '⚠️' }
                ]
            }
        ];

        let loadedApps = {};
        let isPreloaded = false;
        let logoutConfirmState = false;
        let logoutTimeout = null;

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            document.getElementById('digital-clock').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            const monthNames = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            document.getElementById('current-date').innerText = `วัน${getDayName(now.getDay())}ที่ ${String(now.getDate()).padStart(2,'0')} ${monthNames[now.getMonth()]} ${now.getFullYear() + 543}`;
        }
        
        function getDayName(dayIndex) { return ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"][dayIndex]; }

        window.onload = () => {
            setInterval(updateClock, 1000);
            updateClock();
            
            const navContainer = document.getElementById('nav-container');
            MENU_GROUPS.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'menu-group';
                const groupTitle = document.createElement('div');
                groupTitle.className = 'menu-group-title';
                groupTitle.innerHTML = `
                    <span class="min-w-[40px] h-10 flex items-center justify-center glass-panel text-cyan-400">${group.icon}</span>
                    <span class="sidebar-text ml-4 text-[13px] font-bold tracking-wide text-cyan-100 opacity-0 transition-opacity duration-300">${group.name}</span>
                    <span class="sidebar-text ml-auto opacity-0 text-cyan-500/50 chevron">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </span>
                `;
                groupTitle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.menu-group').forEach(g => { if(g !== groupDiv) g.classList.remove('open'); });
                    groupDiv.classList.toggle('open');
                });
                const subMenu = document.createElement('div');
                subMenu.className = 'sub-menu-container';
                group.items.forEach(app => {
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.onclick = (e) => { e.stopPropagation(); switchApp(app.id, app.name); };
                    btn.setAttribute('data-id', app.id);
                    btn.innerHTML = `<span class="min-w-[28px] h-8 flex items-center justify-center text-sm">${app.icon}</span><span class="sidebar-text ml-3 text-xs text-slate-300 font-medium tracking-wide opacity-0 transition-opacity duration-300">${app.name}</span>`;
                    subMenu.appendChild(btn);
                });
                groupDiv.appendChild(groupTitle);
                groupDiv.appendChild(subMenu);
                navContainer.appendChild(groupDiv);
            });
        };

        async function enterSystem() {
            const welcome = document.getElementById('welcome-screen');
            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerHTML = '<span class="animate-pulse">ตรวจสอบโมดูล...</span>';
            
            if (!isPreloaded) await preloadAllApps();
            
            welcome.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                welcome.classList.add('hidden');
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                gotoHome();
            }, 700);
        }

        function gotoHome() { switchApp(HOME_APP_ID, HOME_APP_NAME); }

        function switchApp(id, name) {
            document.getElementById('display-title').innerText = name;
            document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-menu'));
            const activeNav = document.querySelector(`[data-id="${id}"]`);
            if(activeNav) activeNav.classList.add('active-menu');
            if (loadedApps[id]) loadedApps[id].classList.add('active');
            const sidebar = document.getElementById('main-sidebar');
            sidebar.classList.remove('expanded');
            document.querySelectorAll('.menu-group').forEach(g => g.classList.remove('open'));
        }

        async function preloadAllApps() {
            if (isPreloaded) return;
            const overlay = document.getElementById('preload-overlay');
            const container = document.getElementById('stack-container');
            overlay.classList.remove('hidden');
            let completed = 0;
            const allApps = MENU_GROUPS.flatMap(g => g.items);

            for (const app of allApps) {
                if (!loadedApps[app.id]) {
                    const wrap = document.createElement('div');
                    wrap.className = 'app-container';
                    wrap.id = `wrap-${app.id}`;
                    const iframe = document.createElement('iframe');
                    iframe.setAttribute('allow', 'clipboard-write');
                    wrap.appendChild(iframe);
                    container.appendChild(wrap);
                    iframe.src = app.url;
                    loadedApps[app.id] = wrap;
                    await new Promise(r => setTimeout(r, 60)); 
                    completed++;
                    document.getElementById('preload-count').innerText = Math.round((completed / allApps.length) * 100);
                }
            }
            isPreloaded = true;
            setTimeout(() => overlay.classList.add('hidden'), 500);
        }

        function handleLogoutClick() {
            const iconBox = document.getElementById('logout-icon-box');
            if (!logoutConfirmState) {
                logoutConfirmState = true;
                if(iconBox) iconBox.classList.add('bg-red-600', 'animate-pulse');
                logoutTimeout = setTimeout(() => resetLogoutButton(), 3000);
            } else {
                executeLogout();
            }
        }

        function executeLogout() {
            const overlay = document.getElementById('logout-overlay');
            const progress = document.getElementById('logout-progress');
            overlay.style.display = 'flex';
            setTimeout(() => { progress.style.width = '100%'; }, 50);

            setTimeout(() => {
                // Soft Reset instead of location.reload()
                // 1. Hide System UI
                document.getElementById('main-sidebar').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
                
                // 2. Reset welcome screen
                const welcome = document.getElementById('welcome-screen');
                welcome.classList.remove('hidden');
                welcome.style.transform = 'translateY(0)';
                document.getElementById('login-btn').innerHTML = '<span class="relative z-10 font-medium text-lg text-white">คลิกเพื่อเข้าใช้งานระบบ</span>';
                
                // 3. Clear transient data
                document.getElementById('quick-note-area').value = '';
                
                // 4. Hide logout overlay
                overlay.style.display = 'none';
                progress.style.width = '0';
                resetLogoutButton();
            }, 2100);
        }

        function resetLogoutButton() {
            logoutConfirmState = false;
            const iconBox = document.getElementById('logout-icon-box');
            if(iconBox) iconBox.classList.remove('bg-red-600', 'animate-pulse');
            if(logoutTimeout) clearTimeout(logoutTimeout);
        }

        const sidebar = document.getElementById('main-sidebar');
        sidebar.addEventListener('click', function(e) {
            if (!this.classList.contains('expanded') && !e.target.closest('#logout-trigger')) {
                this.classList.add('expanded');
                e.stopPropagation();
            }
        }, true);

        document.getElementById('sidebar-toggle').addEventListener('click', (e) => {
            if (sidebar.classList.contains('expanded')) {
                e.stopPropagation();
                sidebar.classList.remove('expanded');
                document.querySelectorAll('.menu-group').forEach(g => g.classList.remove('open'));
            }
        });

        document.addEventListener('click', function(e) {
            if (sidebar.classList.contains('expanded') && !sidebar.contains(e.target)) {
                sidebar.classList.remove('expanded');
                document.querySelectorAll('.menu-group').forEach(g => g.classList.remove('open'));
            }
        });

        function toggleQuickNote() { document.getElementById('quick-note-panel').classList.toggle('open'); }
        function clearNote() { if(confirm('ล้างบันทึกทั้งหมดหรือไม่?')) document.getElementById('quick-note-area').value = ''; }
    </script>
</body>
</html>
