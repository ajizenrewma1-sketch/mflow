<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow Future Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #0062ff;
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        .font-future { font-family: 'Orbitron', sans-serif; }

        .bg-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute;
            inset: 0;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .sidebar {
            width: 75px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
            position: relative;
            z-index: 50;
        }

        .sidebar:hover {
            width: 300px;
            border-right: 1px solid rgba(0, 242, 255, 0.5);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            position: relative;
            margin: 8px 12px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
            transform: translateX(5px);
        }

        .nav-item.active-menu {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.2) 0%, transparent 100%);
            border-left: 4px solid var(--neon-cyan);
            box-shadow: -10px 0 20px rgba(0, 242, 255, 0.1);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .app-container {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            transform: translateY(10px);
            will-change: transform, opacity;
        }

        .app-container.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: #fff;
        }

        #sidebar-nav { scrollbar-width: none; }
        #sidebar-nav::-webkit-scrollbar { display: none; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.3);
            position: absolute;
            animation: scanline 4s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        .text-reveal {
            background: linear-gradient(to right, #fff 20%, #00f2ff 50%, #fff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        /* Preload Status Overlay */
        #preload-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--neon-cyan);
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body class="flex flex-row">
    <div class="bg-grid"></div>

    <!-- Section: Welcome Screen -->
    <div id="welcome-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-slate-950 transition-all duration-1000">
        <div class="scanline"></div>
        <div class="mb-8 text-center">
            <h1 class="font-future text-6xl font-bold tracking-tighter text-reveal mb-2">M-FLOW SYSTEM</h1>
            <p class="text-cyan-500/80 tracking-[0.3em] text-lg font-medium">ระบบช่วยเหลือการทำงาน</p>
        </div>
        
        <div class="relative group cursor-pointer" onclick="enterSystem()">
            <div class="absolute -inset-4 bg-cyan-500 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition duration-500"></div>
            <button id="login-btn" class="relative px-10 py-4 bg-transparent border border-cyan-500/50 text-cyan-400 rounded-full hover:bg-cyan-500 hover:text-white transition-all duration-300 tracking-widest overflow-hidden">
                <span class="relative z-10 font-medium text-lg">คลิกเพื่อเข้าสู่ระบบ</span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
            </button>
        </div>
    </div>

    <!-- Preload Status Overlay -->
    <div id="preload-overlay">
        <div class="flex items-center gap-3">
            <div class="animate-spin h-4 w-4 border-2 border-cyan-500 border-t-transparent rounded-full"></div>
            <span class="text-xs text-cyan-400 font-future">PRELOADING NEURAL LINKS... <span id="preload-count">0</span>%</span>
        </div>
    </div>

    <!-- Section: Sidebar -->
    <aside id="main-sidebar" class="sidebar flex flex-col hidden overflow-hidden">
        <!-- ปุ่ม M-FLOW: ปรับเป็น Soft Confirm Logout (ทำงานได้ทุก Browser) -->
        <div id="logout-trigger" class="h-20 flex items-center px-5 mb-4 border-b border-cyan-500/10 cursor-pointer hover:bg-red-500/10 transition-all group" onclick="handleLogoutClick()">
            <div id="logout-icon-box" class="min-w-[40px] h-10 flex items-center justify-center bg-cyan-600 rounded-lg shadow-[0_0_15px_rgba(0,242,255,0.4)] transition-all">
                <svg id="logout-svg" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </div>
            <div class="sidebar-text ml-4 opacity-0 transition-opacity duration-300">
                <p id="logout-label-main" class="font-future font-bold text-cyan-400 leading-none">M-FLOW</p>
                <p id="logout-label-sub" class="text-[9px] text-slate-500 tracking-tighter uppercase">Neural Link Established</p>
            </div>
        </div>

        <nav id="sidebar-nav" class="flex-1 overflow-y-auto space-y-1">
            <div id="nav-container"></div>
        </nav>

        <div class="p-4 border-t border-cyan-500/10 text-center cursor-pointer hover:bg-red-500/10 transition-colors" onclick="hardReset()">
            <div class="sidebar-text opacity-0 text-[9px] text-slate-600 uppercase tracking-widest mb-2">Hard System Reset</div>
            <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                <div class="bg-cyan-500 h-full w-1/3 shadow-[0_0_8px_#00f2ff]"></div>
            </div>
        </div>
    </aside>

    <!-- Section: Main UI -->
    <main id="main-content" class="flex-1 flex flex-col relative hidden p-4">
        <header id="top-bar" class="flex justify-between items-center mb-4 px-2 hidden">
            <div class="flex items-center gap-4">
                <button onclick="closeCurrentApp()" class="p-2 glass-panel hover:bg-cyan-500/10 text-slate-400 hover:text-cyan-400 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <div>
                    <h2 id="display-title" class="font-future text-cyan-400 text-lg uppercase tracking-wider leading-none">Command Center</h2>
                    <span class="text-[10px] text-slate-500 font-future uppercase">Neural Link: <span class="text-green-500 font-bold">ACTIVE (SYNCED)</span></span>
                </div>
            </div>
            <div class="flex items-center gap-6 glass-panel px-6 py-2">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-slate-500 uppercase tracking-tighter leading-none">System Status</span>
                    <span class="text-xs font-future text-cyan-300">FULLY OPERATIONAL</span>
                </div>
                <div class="led text-green-500 bg-current"></div>
            </div>
        </header>

        <div id="desktop-grid" class="flex-1 flex flex-col items-center justify-center">
            <div class="text-center relative">
                <div class="absolute -inset-40 bg-cyan-500/5 blur-[120px] rounded-full"></div>
                <div class="mb-6 relative inline-block">
                    <svg class="w-32 h-32 text-cyan-500/10 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5" d="M12 21a9 9 0 100-18 9 9 0 000 18z"></path></svg>
                    <svg class="w-16 h-16 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-cyan-500/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 20l-5.447-2.724A2 2 0 013 15.482V5.518a2 2 0 011.553-1.943L9 2l5.447 2.724A2 2 0 0116 6.669V15l-6 5V20z"></path></svg>
                </div>
                <h3 class="font-future text-2xl text-cyan-400/30 tracking-[0.4em] uppercase">Ready for Deployment</h3>
                <p class="text-[10px] mt-4 text-slate-600 font-future tracking-widest italic animate-pulse">All systems preloaded. Select a module from sidebar.</p>
            </div>
        </div>

        <div id="stack-container" class="flex-1 relative hidden rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
            <!-- Iframes injected here -->
        </div>
    </main>

    <script>
        const APPS = [
            { id: 'sla', name: 'SLA 3 ชั่วโมง', url: 'https://sla-temp.vercel.app/', icon: '⏱️' },
            { id: 'r05', name: 'ชนข้อมูลต่างๆ', url: 'https://r05-vs-tcvs.vercel.app/', icon: '📊' },
            { id: 'dispute-find', name: 'หาเหตุผลไม่เจอ TCVS', url: 'https://dispult.vercel.app/', icon: '🔍' },
            { id: 'pinai', name: 'ทำพินัย', url: 'https://pinai.vercel.app/', icon: '📜' },
            { id: 'multi-dis', name: 'โต้แย้งหลายทะเบียน', url: 'https://multi-dispul.vercel.app/', icon: '🚗' },
            { id: 'single-dis', name: 'โต้แย้ง 1 ทะเบียน', url: 'https://dupit.netlify.app/', icon: '📍' },
            { id: 'log-l', name: 'แยก Log L', url: 'https://log-l.vercel.app/', icon: '📝' },
            { id: 'tg-ยอด', name: 'ทำยอด TG', url: 'https://tg-five-xi.vercel.app/', icon: '📈' },
            { id: 'temp-press', name: 'ทำยอดกดน้อง Temp', url: 'https://temp3hours.vercel.app/', icon: '💡' },
            { id: 'temp-wrong', name: 'ลงยอดผิด Temp', url: 'https://temp-wong.vercel.app/', icon: '⚠️' },
            { id: 'excel-include', name: 'รวมช่อง Excel', url: 'https://include-sentences.vercel.app/', icon: '📂' }
        ];

        let loadedApps = {};
        let isPreloaded = false;
        let logoutConfirmState = false;
        let logoutTimeout = null;

        window.onload = () => {
            const navContainer = document.getElementById('nav-container');
            APPS.forEach(app => {
                const btn = document.createElement('button');
                btn.className = 'nav-item w-full flex items-center hover:text-cyan-300 transition-all';
                btn.onclick = () => switchApp(app.id, app.name);
                btn.setAttribute('data-id', app.id);
                btn.innerHTML = `
                    <span class="min-w-[32px] h-8 flex items-center justify-center glass-panel text-lg">${app.icon}</span>
                    <span class="sidebar-text ml-4 text-xs font-medium tracking-wide opacity-0 transition-opacity duration-300">${app.name}</span>
                `;
                navContainer.appendChild(btn);
            });
        };

        // ระบบ Logout แบบ Click-to-Confirm เพื่อเลี่ยงปัญหา alert/confirm block
        function handleLogoutClick() {
            const iconBox = document.getElementById('logout-icon-box');
            const mainLabel = document.getElementById('logout-label-main');
            const subLabel = document.getElementById('logout-label-sub');

            if (!logoutConfirmState) {
                // First Click: เปลี่ยนสถานะเป็นรอยืนยัน
                logoutConfirmState = true;
                iconBox.classList.remove('bg-cyan-600');
                iconBox.classList.add('bg-red-600', 'animate-bounce');
                mainLabel.innerText = "CONFIRM?";
                mainLabel.classList.add('text-red-500');
                subLabel.innerText = "CLICK AGAIN TO LOGOUT";
                subLabel.classList.add('text-red-400');

                // รีเซ็ตหากไม่กดซ้ำภายใน 3 วินาที
                logoutTimeout = setTimeout(() => {
                    resetLogoutButton();
                }, 3000);
            } else {
                // Second Click: ทำการ Logout จริง
                clearTimeout(logoutTimeout);
                performFullLogout();
            }
        }

        function resetLogoutButton() {
            logoutConfirmState = false;
            const iconBox = document.getElementById('logout-icon-box');
            const mainLabel = document.getElementById('logout-label-main');
            const subLabel = document.getElementById('logout-label-sub');

            iconBox.classList.remove('bg-red-600', 'animate-bounce');
            iconBox.classList.add('bg-cyan-600');
            mainLabel.innerText = "M-FLOW";
            mainLabel.classList.remove('text-red-500');
            subLabel.innerText = "Neural Link Established";
            subLabel.classList.remove('text-red-400');
        }

        function performFullLogout() {
            // 1. สั่ง Reload ทุก Iframe เพื่อล้างข้อมูล
            Object.values(loadedApps).forEach(wrap => {
                const ifr = wrap.querySelector('iframe');
                if (ifr) {
                    ifr.src = ifr.src; // Reload
                }
            });

            // 2. ปิดหน้าแอปที่เปิดอยู่
            closeCurrentApp();
            
            // 3. รีเซ็ตสถานะปุ่ม
            resetLogoutButton();

            // 4. กลับหน้าต้อนรับ
            exitToWelcome();
        }

        async function preloadAllApps() {
            if (isPreloaded) return;
            const overlay = document.getElementById('preload-overlay');
            const countText = document.getElementById('preload-count');
            const container = document.getElementById('stack-container');
            
            overlay.style.display = 'block';
            let completed = 0;

            for (const app of APPS) {
                if (!loadedApps[app.id]) {
                    const wrap = document.createElement('div');
                    wrap.className = 'app-container';
                    wrap.id = `wrap-${app.id}`;
                    const iframe = document.createElement('iframe');
                    iframe.setAttribute('allow', 'clipboard-write');
                    iframe.setAttribute('loading', 'eager');
                    wrap.appendChild(iframe);
                    container.appendChild(wrap);
                    iframe.src = app.url;
                    loadedApps[app.id] = wrap;
                    await new Promise(r => setTimeout(r, 150)); 
                    completed++;
                    countText.innerText = Math.round((completed / APPS.length) * 100);
                }
            }
            isPreloaded = true;
            setTimeout(() => overlay.style.display = 'none', 1000);
        }

        async function enterSystem() {
            const welcome = document.getElementById('welcome-screen');
            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerHTML = '<span class="animate-pulse">BOOTING NEURAL LINKS...</span>';
            await preloadAllApps();
            welcome.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                welcome.classList.add('hidden');
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('main-content').style.opacity = '1';
            }, 800);
        }

        function exitToWelcome() {
            const welcome = document.getElementById('welcome-screen');
            const mainSidebar = document.getElementById('main-sidebar');
            const mainContent = document.getElementById('main-content');
            
            mainContent.style.opacity = '0';
            mainSidebar.style.opacity = '0';
            document.getElementById('login-btn').innerHTML = '<span class="relative z-10 font-medium text-lg">คลิกเพื่อเข้าสู่ระบบ</span>';

            setTimeout(() => {
                welcome.classList.remove('hidden');
                welcome.style.transform = 'translateY(0)';
                mainSidebar.classList.add('hidden');
                mainContent.classList.add('hidden');
                mainSidebar.style.opacity = '1';
                mainContent.style.opacity = '1';
            }, 400);
        }

        function switchApp(id, name) {
            requestAnimationFrame(() => {
                document.getElementById('desktop-grid').classList.add('hidden');
                document.getElementById('stack-container').classList.remove('hidden');
                document.getElementById('top-bar').classList.remove('hidden');
                document.getElementById('display-title').innerText = name;
                document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-menu'));
                const activeNav = document.querySelector(`[data-id="${id}"]`);
                if(activeNav) activeNav.classList.add('active-menu');
                if (loadedApps[id]) loadedApps[id].classList.add('active');
            });
        }

        function closeCurrentApp() {
            document.getElementById('stack-container').classList.add('hidden');
            document.getElementById('top-bar').classList.add('hidden');
            document.getElementById('desktop-grid').classList.remove('hidden');
            document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-menu'));
        }

        function hardReset() {
            window.location.reload();
        }

        const sidebar = document.getElementById('main-sidebar');
        sidebar.addEventListener('mouseenter', () => {
            document.querySelectorAll('.sidebar-text').forEach(el => el.style.opacity = '1');
        });
        sidebar.addEventListener('mouseleave', () => {
            document.querySelectorAll('.sidebar-text').forEach(el => el.style.opacity = '0');
        });
    </script>
</body>
</html>
